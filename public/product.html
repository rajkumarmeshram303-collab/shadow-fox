<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ShopNova</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-detail-container {
            display: flex;
            gap: 4rem;
            margin-top: 4rem;
            margin-bottom: 4rem;
        }
        .product-gallery {
            flex: 1;
        }
        .product-gallery img {
            width: 100%;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }
        .product-details {
            flex: 1;
        }
        .product-details h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .product-brand {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .product-price-lg {
            font-size: 2rem;
            font-weight: 700;
            margin: 1.5rem 0;
        }
        .product-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
        }
        .btn-lg {
            padding: 1rem 2rem;
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .product-detail-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Shop<span>Nova</span></a>
            <div class="nav-icons">
                <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>
                <a href="login.html" class="nav-link"><i class="far fa-user"></i> <span>Login</span></a>
                <a href="wishlist.html" class="nav-link"><i class="far fa-heart"></i> <span>Wishlist</span></a>
                <a href="cart.html" class="nav-link cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartBadge">0</span>
                    <span>Cart</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="container" id="productContainer">
        <!-- Content injected via JS -->
        <p style="margin-top: 4rem;">Loading product details...</p>
    </div>

    <!-- Related Products -->
    <section class="section" id="relatedProductsSection" style="display: none; padding-top: 0;">
        <div class="container">
            <h2 style="font-size: 1.8rem; margin-bottom: 2rem;">You may also like</h2>
            <div class="product-grid" id="relatedProductsGrid">
                <!-- Related products injected here -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-col">
                    <h3>ShopNova</h3>
                    <p>Your ultimate shopping destination for everything you love.</p>
                </div>
                <div class="footer-col">
                    <h3>Quick Links</h3>
                    <ul>
                        <li><a href="about.html">About Us</a></li>
                        <li><a href="contact.html">Contact Us</a></li>
                        <li><a href="#">FAQ</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 ShopNova. All rights reserved.</p>
                <p style="margin-top: 10px; font-weight: bold; color: var(--primary-color);">Managed by - Rajkumar Meshram</p>
            </div>
        </div>
    </footer>

    <div id="toast" class="toast"></div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('productContainer');

            if (!id) {
                container.innerHTML = '<p style="margin-top:4rem;">Product not found.</p>';
                return;
            }

            try {
                const res = await fetch(`/api/products/${id}`);
                const p = await res.json();

                if (p.message) {
                    container.innerHTML = `<p style="margin-top:4rem;">${p.message}</p>`;
                    return;
                }

                document.title = `${p.name} | ShopNova`;

                const inWishlist = isInWishlist(p._id);
                const wishlistIcon = inWishlist ? 'fas' : 'far';
                const wishlistActive = inWishlist ? 'active' : '';

                container.innerHTML = `
                    <div class="product-detail-container">
                        <div class="product-gallery">
                            <img src="${p.image}" alt="${p.name}">
                        </div>
                        <div class="product-details">
                            <div class="product-brand">${p.brand}</div>
                            <h1>${p.name}</h1>
                            <div class="product-rating">
                                ${renderStars(p.rating)}
                                <span>(${p.numReviews} reviews)</span>
                            </div>
                            <div class="product-price-lg">${formatPrice(p.price, p.discountPercentage)}</div>
                            <p class="product-description">${p.description}</p>
                            
                            <p style="margin-bottom: 2rem;"><strong>Status:</strong> ${p.countInStock > 0 ? 'In Stock' : '<span style="color:red">Out of Stock</span>'}</p>

                            <div class="action-buttons">
                                <button class="btn btn-primary btn-lg" ${p.countInStock === 0 ? 'disabled' : ''} onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&#39;")})'>
                                    Add to Cart
                                </button>
                                <button class="btn-wishlist btn-lg ${wishlistActive}" onclick='toggleWishlist(${JSON.stringify(p).replace(/'/g, "&#39;")}, this)'>
                                    <i class="${wishlistIcon} fa-heart"></i> Add to Wishlist
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                // Fetch Related Products
                fetchRelatedProducts(p.category, p._id);
            } catch (error) {
                container.innerHTML = '<p style="margin-top:4rem;">Error loading product.</p>';
            }
        });

        async function fetchRelatedProducts(category, currentProductId) {
            try {
                const res = await fetch(`/api/products?category=${encodeURIComponent(category)}`);
                const products = await res.json();
                
                // Filter out current product and get up to 4 recommendations
                const related = products.filter(p => p._id !== currentProductId).slice(0, 4);

                if (related.length > 0) {
                    document.getElementById('relatedProductsSection').style.display = 'block';
                    document.getElementById('relatedProductsGrid').innerHTML = related.map(p => {
                        const inWishlist = isInWishlist(p._id);
                        const wishlistIcon = inWishlist ? 'fas' : 'far';
                        const wishlistActive = inWishlist ? 'active' : '';

                        return `
                        <div class="product-card">
                            <a href="product.html?id=${p._id}">
                                <img src="${p.image}" alt="${p.name}" class="product-image">
                            </a>
                            <div class="product-info">
                                <div class="product-category">${p.category}</div>
                                <a href="product.html?id=${p._id}">
                                    <h3 class="product-title">${p.name}</h3>
                                </a>
                                <div class="product-rating">
                                    ${renderStars(p.rating)}
                                </div>
                                <div class="product-price">${formatPrice(p.price, p.discountPercentage)}</div>
                                <div class="product-actions">
                                    <button class="btn-cart" onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&#39;")})'>Add</button>
                                    <button class="btn-wishlist ${wishlistActive}" onclick='toggleWishlist(${JSON.stringify(p).replace(/'/g, "&#39;")}, this)'>
                                        <i class="${wishlistIcon} fa-heart"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        `
                    }).join('');
                }
            } catch (error) {
                console.error('Error fetching related products', error);
            }
        }
    </script>
</body>
</html>
